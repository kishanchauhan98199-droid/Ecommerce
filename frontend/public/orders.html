<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — NexMart</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="page-wrapper">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo">
        <div class="logo-icon">🛒</div>
        <span class="logo-text">NexMart</span>
      </a>
      <form class="navbar__search" id="search-form">
        <input type="text" id="search-input" class="search-input" placeholder="Search products…"/>
        <button type="submit" class="search-btn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
      </form>
      <div class="navbar__actions">
        <a href="cart.html" class="nav-icon-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-badge hidden">0</span>
        </a>
        <a href="login.html" class="btn btn-primary btn-sm" id="nav-login-link">Sign In</a>
        <div class="nav-dropdown-wrap hidden" id="nav-user-wrap">
          <button class="nav-user-btn" id="nav-user-btn">
            <div class="user-avatar-sm" id="nav-user-avatar">U</div>
            <span id="nav-user-name">Account</span>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="nav-dropdown hidden" id="nav-dropdown">
            <a href="orders.html" style="color:var(--indigo-bright)">📦 My Orders</a>
            <div class="nav-dropdown-divider"></div>
            <button class="danger" id="nav-logout-btn">↩ Logout</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="container orders-page">
      <h1 class="page-title">My Orders</h1>
      <div id="orders-wrap">
        <div class="spinner-overlay"><div class="spinner"></div><p class="spinner-label">Loading orders…</p></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__bottom">© <span id="year"></span> NexMart. All rights reserved.</div>
  </footer>
</div>

<div id="toast-container"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.0/axios.min.js"></script>
<script src="app.js"></script>
<script>
/* ── ORDERS PAGE ── */

// Require login
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('year').textContent = new Date().getFullYear();
  if (!Auth.isLoggedIn()) {
    Toast.warning('Please sign in to view your orders.');
    setTimeout(() => { window.location.href = 'login.html?next=orders.html'; }, 800);
    return;
  }
  loadOrders();
});

// Mock orders for fallback
const MOCK_ORDERS = [
  {
    _id: 'ORD' + Date.now(),
    createdAt: new Date().toISOString(),
    status: 'delivered',
    totalPrice: 5998,
    items: [
      { name: 'Premium Wireless Headphones', price: 2999, qty: 1, image: 'https://picsum.photos/seed/p1/100/90' },
      { name: 'Smart Watch Pro X',           price: 2999, qty: 1, image: 'https://picsum.photos/seed/p2/100/90' },
    ],
  },
  {
    _id: 'ORD' + (Date.now() - 86400000),
    createdAt: new Date(Date.now() - 86400000).toISOString(),
    status: 'processing',
    totalPrice: 1299,
    items: [
      { name: 'Leather Bifold Wallet', price: 1299, qty: 1, image: 'https://picsum.photos/seed/p4/100/90' },
    ],
  },
  {
    _id: 'ORD' + (Date.now() - 3 * 86400000),
    createdAt: new Date(Date.now() - 3 * 86400000).toISOString(),
    status: 'shipped',
    totalPrice: 7499,
    items: [
      { name: 'Mechanical Keyboard TKL', price: 7499, qty: 1, image: 'https://picsum.photos/seed/p13/100/90' },
    ],
  },
];

async function loadOrders() {
  const wrap = document.getElementById('orders-wrap');

  let orders;
  try {
    const { data } = await API.getMyOrders();
    orders = data.orders || data;
  } catch {
    orders = MOCK_ORDERS;
  }

  if (!orders.length) {
    UI.showEmpty(wrap, '📦', 'No orders yet', 'Your order history will appear here.',
      `<a href="index.html" class="btn btn-primary btn-lg mt-16">Start Shopping</a>`);
    return;
  }

  wrap.innerHTML = `<div class="orders-list">${orders.map(renderOrderCard).join('')}</div>`;
}

function renderOrderCard(order) {
  const date = new Date(order.createdAt).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
  const status = order.status || 'pending';
  const thumbs = (order.items || []).slice(0, 5).map(item => `
    <img src="${item.image || `https://picsum.photos/seed/${item.product||item.name}/100/90`}"
         class="order-item-thumb" alt="${item.name}"
         onerror="this.src='https://picsum.photos/seed/fallback/100/90'"/>`).join('');
  const more = (order.items?.length || 0) > 5 ? `<span class="text-muted" style="font-size:13px;align-self:center">+${order.items.length - 5} more</span>` : '';
  const statusLabel = status.charAt(0).toUpperCase() + status.slice(1);

  return `
    <div class="order-card">
      <div class="order-header">
        <div>
          <div class="order-id">${order._id}</div>
          <div class="order-date">Placed on ${date}</div>
        </div>
        <span class="order-status status-${status}">${statusLabel}</span>
      </div>
      <div class="order-body">
        <div class="order-items-preview">
          ${thumbs}${more}
        </div>
        <div class="order-footer">
          <div class="order-total">
            <span>Order Total:</span>
            ${UI.currency(order.totalPrice)}
          </div>
          <div style="display:flex;gap:10px">
            <button class="btn btn-ghost btn-sm" onclick="toggleOrderDetails('${order._id}')">
              View Details
            </button>
            ${status === 'delivered' ? `<button class="btn btn-outline btn-sm">Reorder</button>` : ''}
          </div>
        </div>
      </div>

      <!-- Expandable details -->
      <div class="order-details hidden" id="details-${order._id}">
        <div style="padding:0 22px 22px">
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead>
              <tr style="border-bottom:1px solid var(--border);color:var(--text-3)">
                <th style="text-align:left;padding:8px 0">Product</th>
                <th style="text-align:right;padding:8px 0">Qty</th>
                <th style="text-align:right;padding:8px 0">Price</th>
                <th style="text-align:right;padding:8px 0">Subtotal</th>
              </tr>
            </thead>
            <tbody>
              ${(order.items||[]).map(item => `
                <tr style="border-bottom:1px solid var(--border)">
                  <td style="padding:10px 0;color:var(--text-2)">${item.name}</td>
                  <td style="text-align:right;color:var(--text-3)">${item.qty}</td>
                  <td style="text-align:right;color:var(--text-3)">${UI.currency(item.price)}</td>
                  <td style="text-align:right;font-weight:600">${UI.currency(item.price * item.qty)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
          ${order.shippingAddress ? `
            <div style="margin-top:16px;padding:14px;background:var(--ink-3);border-radius:var(--radius);font-size:13px">
              <strong style="color:var(--indigo-bright);display:block;margin-bottom:6px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase">Delivered to</strong>
              <span style="color:var(--text-2)">${order.shippingAddress.fullName}, ${order.shippingAddress.street}, ${order.shippingAddress.city} — ${order.shippingAddress.pincode}</span>
            </div>` : ''}
        </div>
      </div>
    </div>`;
}

function toggleOrderDetails(orderId) {
  const el  = document.getElementById(`details-${orderId}`);
  const btn = event.target;
  const open = el.classList.toggle('hidden');
  btn.textContent = open ? 'View Details' : 'Hide Details';
}
</script>
</body>
</html>
