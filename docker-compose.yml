# ════════════════════════════════════════════════════════════
#  Style Gallery Hub — Docker Compose (Full Stack)
#  Usage:
#    docker-compose up --build        # start all services
#    docker-compose up -d             # background mode
#    docker-compose down              # stop
#    docker-compose logs -f api       # tail server logs
# ════════════════════════════════════════════════════════════

version: '3.9'

services:

  # ── MongoDB ──────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: sgh_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-sgh_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-supersecret}
      MONGO_INITDB_DATABASE:      style-gallery-hub
    volumes:
      - mongo_data:/data/db
      - ./server/scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - sgh_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (session cache / rate-limit store) ───────────────
  redis:
    image: redis:7-alpine
    container_name: sgh_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - sgh_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Express API ───────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sgh_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV:              production
      PORT:                  5000
      MONGO_URI:             mongodb://${MONGO_USER:-sgh_admin}:${MONGO_PASS:-supersecret}@mongo:27017/style-gallery-hub?authSource=admin
      REDIS_URL:             redis://redis:6379
      JWT_SECRET:            ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRE:            30d
      CLIENT_URL:            http://localhost:3000
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY:    ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      STRIPE_SECRET_KEY:     ${STRIPE_SECRET_KEY}
      RAZORPAY_KEY_ID:       ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET:   ${RAZORPAY_KEY_SECRET}
      SMTP_HOST:             ${SMTP_HOST:-smtp.gmail.com}
      SMTP_USER:             ${SMTP_USER}
      SMTP_PASS:             ${SMTP_PASS}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sgh_net
    volumes:
      - ./server:/app
      - /app/node_modules       # prevent host node_modules from overriding
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── React Client (served via nginx in production) ─────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL:             http://localhost:5000/api
        REACT_APP_STRIPE_PUBLIC_KEY:   ${REACT_APP_STRIPE_PUBLIC_KEY}
        REACT_APP_RAZORPAY_KEY_ID:     ${REACT_APP_RAZORPAY_KEY_ID}
    container_name: sgh_client
    restart: unless-stopped
    ports:
      - "3000:80"             # nginx serves on 80 inside container
    depends_on:
      - api
    networks:
      - sgh_net

  # ── Nginx reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sgh_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro        # place your certs here
    depends_on:
      - api
      - client
    networks:
      - sgh_net

volumes:
  mongo_data:
    driver: local

networks:
  sgh_net:
    driver: bridge